<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sign in — Calendar</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      background: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #3c4043;
    }

    .card {
      width: 100%;
      max-width: 400px;
      padding: 48px 40px 40px;
      border: 1px solid #dadce0;
      border-radius: 8px;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* Logo — matches main app .logo */
    .logo {
      display: flex;
      align-items: center;
      gap: 6px;
      text-decoration: none;
      margin-bottom: 24px;
    }
    .logo-date {
      width: 32px;
      height: 32px;
      background: #4285f4;
      border-radius: 4px;
      color: #fff;
      font-size: 14px;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .logo-word {
      font-size: 20px;
      font-weight: 400;
      color: #3c4043;
      letter-spacing: -.3px;
    }

    h1 {
      font-size: 24px;
      font-weight: 400;
      color: #202124;
      text-align: center;
      margin-bottom: 8px;
    }

    .subtext {
      font-size: 14px;
      color: #5f6368;
      text-align: center;
      margin-bottom: 32px;
    }

    /* Google sign-in button */
    .google-btn {
      display: flex;
      align-items: center;
      gap: 12px;
      width: 100%;
      padding: 10px 16px;
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 4px;
      text-decoration: none;
      color: #3c4043;
      font-family: 'Google Sans', Roboto, Arial, sans-serif;
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: background 0.15s, box-shadow 0.15s;
      justify-content: center;
    }
    .google-btn:hover {
      background: #f8f9fa;
      box-shadow: 0 1px 3px rgba(0,0,0,.12);
    }
    .google-btn:active {
      background: #f1f3f4;
    }

    .google-g {
      flex-shrink: 0;
      width: 18px;
      height: 18px;
    }

    .error-msg {
      margin-top: 16px;
      font-size: 13px;
      color: #d93025;
      text-align: center;
    }
  </style>
</head>
<body>

<div class="card">
  <div class="logo">
    <div class="logo-date" id="logoDate"></div>
    <span class="logo-word">Calendar</span>
  </div>

  <h1>Sign in to your Calendar</h1>
  <p class="subtext">View and manage your Google Calendar events</p>

  <a class="google-btn" href="/auth/google">
    <!-- Google G logo (real 4-color) -->
    <svg class="google-g" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
      <path fill="#4285F4" d="M17.64 9.2c0-.637-.057-1.251-.164-1.84H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z"/>
      <path fill="#34A853" d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z"/>
      <path fill="#FBBC05" d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z"/>
      <path fill="#EA4335" d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z"/>
    </svg>
    Sign in with Google
  </a>

  <p id="errorMsg" class="error-msg" style="display:none">
    Sign-in failed. Please try again.
  </p>
</div>

<script>
  document.getElementById('logoDate').textContent = new Date().getDate();
  if (new URLSearchParams(window.location.search).get('error') === 'auth_failed') {
    document.getElementById('errorMsg').style.display = '';
  }
</script>
</body>
</html>
