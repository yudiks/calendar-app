<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Book a meeting with Yudi</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Google Sans", Roboto, Arial, sans-serif;
      background: #f1f3f4;
      color: #3c4043;
      min-height: 100vh;
    }

    /* ── Header ── */
    .top-header {
      background: #fff;
      border-bottom: 1px solid #dadce0;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .logo-icon {
      width: 36px; height: 36px;
      background: #4285f4;
      color: #fff;
      border-radius: 8px;
      font-size: 1.1rem;
      font-weight: 700;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
    }
    .logo-text { font-size: 1rem; color: #3c4043; }
    .logo-text strong { font-weight: 600; }

    /* ── Week nav ── */
    .week-nav {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 12px;
      padding: 20px 24px 12px;
    }
    .nav-btn {
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 50%;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      color: #5f6368;
      transition: background .1s;
    }
    .nav-btn:hover { background: #f1f3f4; }
    .week-label {
      font-size: .9375rem;
      font-weight: 500;
      color: #3c4043;
      min-width: 200px;
      text-align: center;
    }

    /* ── Calendar grid ── */
    .cal-wrap {
      max-width: 900px;
      margin: 0 auto;
      padding: 0 16px 48px;
    }
    .cal-grid {
      background: #fff;
      border-radius: 12px;
      border: 1px solid #dadce0;
      overflow: hidden;
    }
    .cal-header-row {
      display: grid;
      grid-template-columns: 64px repeat(7, 1fr);
      border-bottom: 2px solid #dadce0;
    }
    .ch-spacer { background: #f8f9fa; }
    .ch-day {
      padding: 10px 4px 8px;
      text-align: center;
      border-left: 1px solid #dadce0;
      background: #f8f9fa;
    }
    .ch-day-name {
      font-size: .6875rem;
      font-weight: 600;
      color: #70757a;
      text-transform: uppercase;
      letter-spacing: .06em;
    }
    .ch-day-num {
      font-size: 1.25rem;
      font-weight: 400;
      color: #3c4043;
      margin-top: 2px;
    }
    .ch-day-num.today {
      background: #4285f4;
      color: #fff;
      border-radius: 50%;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      margin: 2px auto 0;
      font-size: 1.1rem;
    }

    .cal-body {}
    .time-row {
      display: grid;
      grid-template-columns: 64px repeat(7, 1fr);
      border-bottom: 1px solid #e8eaed;
      min-height: 48px;
    }
    .time-row:last-child { border-bottom: none; }
    .time-cell {
      font-size: .6875rem;
      color: #70757a;
      padding: 4px 6px 0 0;
      text-align: right;
      border-right: 1px solid #dadce0;
      line-height: 1.2;
      user-select: none;
    }
    .slot-cell {
      border-left: 1px solid #e8eaed;
      padding: 3px;
      display: flex;
      align-items: stretch;
    }
    .slot-cell.off { background: #fafafa; } /* weekend / outside hours */

    .slot-btn {
      width: 100%;
      border: none;
      border-radius: 6px;
      font-size: .75rem;
      font-weight: 500;
      cursor: pointer;
      transition: background .12s, transform .1s;
      padding: 4px 2px;
    }
    .slot-btn.available {
      background: #e8f0fe;
      color: #1a73e8;
    }
    .slot-btn.available:hover {
      background: #1a73e8;
      color: #fff;
      transform: scale(1.04);
    }
    .slot-btn.booked {
      background: #f1f3f4;
      color: #bdc1c6;
      cursor: not-allowed;
      text-decoration: line-through;
    }

    /* ── Booking modal ── */
    .modal-backdrop {
      position: fixed; inset: 0;
      background: rgba(0,0,0,.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 100;
      padding: 16px;
    }
    .modal-backdrop.hidden { display: none; }
    .modal {
      background: #fff;
      border-radius: 12px;
      width: min(440px, 100%);
      box-shadow: 0 24px 48px rgba(0,0,0,.18);
      overflow: hidden;
    }
    .modal-header {
      background: #4285f4;
      color: #fff;
      padding: 20px 24px 16px;
    }
    .modal-header h2 { font-size: 1.1rem; font-weight: 600; margin-bottom: 4px; }
    .modal-header p { font-size: .875rem; opacity: .88; }
    .modal-body { padding: 24px; }
    .field { margin-bottom: 16px; }
    .field label {
      display: block;
      font-size: .8125rem;
      font-weight: 500;
      color: #5f6368;
      margin-bottom: 6px;
    }
    .field input {
      width: 100%;
      border: 1px solid #dadce0;
      border-radius: 6px;
      padding: 10px 12px;
      font-size: .9375rem;
      color: #3c4043;
      outline: none;
      transition: border-color .15s;
    }
    .field input:focus { border-color: #4285f4; }
    .field-err {
      font-size: .75rem;
      color: #d93025;
      margin-top: 4px;
      display: none;
    }
    .modal-actions {
      display: flex;
      gap: 10px;
      justify-content: flex-end;
      padding: 0 24px 24px;
    }
    .btn-cancel {
      background: none;
      border: 1px solid #dadce0;
      border-radius: 6px;
      padding: 9px 20px;
      font-size: .875rem;
      font-weight: 500;
      color: #3c4043;
      cursor: pointer;
      transition: background .1s;
    }
    .btn-cancel:hover { background: #f1f3f4; }
    .btn-confirm {
      background: #4285f4;
      border: none;
      border-radius: 6px;
      padding: 9px 20px;
      font-size: .875rem;
      font-weight: 500;
      color: #fff;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-confirm:hover { background: #1a73e8; }
    .btn-confirm:disabled { background: #a8c7fa; cursor: not-allowed; }

    /* ── Confirmation screen ── */
    .confirm-screen {
      max-width: 440px;
      margin: 60px auto;
      background: #fff;
      border-radius: 12px;
      border: 1px solid #dadce0;
      padding: 40px 32px;
      text-align: center;
    }
    .confirm-screen.hidden { display: none; }
    .check-circle {
      width: 64px; height: 64px;
      background: #e6f4ea;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      margin: 0 auto 20px;
      font-size: 2rem;
    }
    .confirm-screen h2 { font-size: 1.25rem; font-weight: 600; margin-bottom: 8px; color: #202124; }
    .confirm-screen p { font-size: .9rem; color: #5f6368; margin-bottom: 24px; }
    .booking-summary {
      background: #f8f9fa;
      border-radius: 8px;
      border: 1px solid #dadce0;
      padding: 16px 20px;
      text-align: left;
    }
    .summary-row {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: .875rem;
      color: #3c4043;
      padding: 4px 0;
    }
    .summary-row svg { flex-shrink: 0; color: #5f6368; }

    /* ── Loading / error states ── */
    .state-msg {
      text-align: center;
      padding: 32px;
      color: #70757a;
      font-size: .875rem;
    }
    .error-banner {
      background: #fce8e6;
      color: #c5221f;
      border-radius: 6px;
      padding: 10px 14px;
      font-size: .8125rem;
      margin-bottom: 12px;
      display: none;
    }

    @media (max-width: 640px) {
      .cal-header-row, .time-row { grid-template-columns: 44px repeat(7, 1fr); }
      .time-cell { font-size: .5625rem; padding-right: 3px; }
      .ch-day-name { font-size: .5625rem; }
      .ch-day-num { font-size: .9rem; }
      .slot-btn { font-size: .625rem; }
    }
  </style>
</head>
<body>

<header class="top-header">
  <div class="logo-icon" id="logoDate"></div>
  <div class="logo-text">Book a meeting with <strong>Yudi</strong></div>
</header>

<!-- Week navigation -->
<div class="week-nav">
  <button class="nav-btn" id="prevWeek" title="Previous week">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
  </button>
  <div class="week-label" id="weekLabel"></div>
  <button class="nav-btn" id="nextWeek" title="Next week">
    <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
  </button>
</div>

<!-- Main calendar grid -->
<div class="cal-wrap">
  <div id="confirmScreen" class="confirm-screen hidden">
    <div class="check-circle">✓</div>
    <h2>You're booked!</h2>
    <p>Check your email for a confirmation.</p>
    <div class="booking-summary" id="bookingSummary"></div>
  </div>

  <div id="calGrid" class="cal-grid">
    <div class="state-msg" id="loadingMsg">Loading availability…</div>
  </div>
</div>

<!-- Booking modal -->
<div class="modal-backdrop hidden" id="backdrop">
  <div class="modal">
    <div class="modal-header">
      <h2 id="modalSlotLabel">Book a slot</h2>
      <p id="modalSlotSub"></p>
    </div>
    <div class="modal-body">
      <div class="error-banner" id="modalErr"></div>
      <div class="field">
        <label for="nameInput">Your name</label>
        <input type="text" id="nameInput" placeholder="Jane Smith" autocomplete="name" />
        <div class="field-err" id="nameErr">Please enter your name.</div>
      </div>
      <div class="field">
        <label for="emailInput">Email address</label>
        <input type="email" id="emailInput" placeholder="jane@example.com" autocomplete="email" />
        <div class="field-err" id="emailErr">Please enter a valid email.</div>
      </div>
    </div>
    <div class="modal-actions">
      <button class="btn-cancel" id="cancelBtn">Cancel</button>
      <button class="btn-confirm" id="confirmBtn">Confirm booking</button>
    </div>
  </div>
</div>

<script>
(() => {
  const MONTHS = ['January','February','March','April','May','June',
                  'July','August','September','October','November','December'];
  const DAYS   = ['MON','TUE','WED','THU','FRI','SAT','SUN'];
  const MONTHS_SHORT = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  document.getElementById('logoDate').textContent = new Date().getDate();

  // ── Week state ──────────────────────────────────────────────────────────────
  function getMondayOf(d) {
    const date = new Date(d);
    const day = date.getDay();
    date.setDate(date.getDate() - (day === 0 ? 6 : day - 1));
    date.setHours(0,0,0,0);
    return date;
  }
  function toDateStr(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }
  function formatDate(d) {
    return d.toLocaleDateString('en-US', { weekday:'long', month:'long', day:'numeric', year:'numeric' });
  }
  function fmtTime(t) {
    const [h, m] = t.split(':').map(Number);
    const ampm = h < 12 ? 'AM' : 'PM';
    const h12 = h % 12 || 12;
    return `${h12}:${String(m).padStart(2,'0')} ${ampm}`;
  }

  let weekStart = getMondayOf(new Date()); // show current week by default — skip to first future weekday
  // If today is weekend, jump to next Monday
  const todayDow = new Date().getDay();
  if (todayDow === 0 || todayDow === 6) {
    weekStart = getMondayOf(new Date(Date.now() + 7 * 86400000));
  }

  let selectedSlot = null; // { date, time }
  let avail = null;

  // ── Render week label ────────────────────────────────────────────────────────
  function updateWeekLabel() {
    const end = new Date(weekStart); end.setDate(end.getDate() + 6);
    const s = weekStart, e = end;
    let label;
    if (s.getMonth() === e.getMonth()) {
      label = `${MONTHS[s.getMonth()]} ${s.getDate()} – ${e.getDate()}, ${s.getFullYear()}`;
    } else {
      label = `${MONTHS_SHORT[s.getMonth()]} ${s.getDate()} – ${MONTHS_SHORT[e.getMonth()]} ${e.getDate()}, ${e.getFullYear()}`;
    }
    document.getElementById('weekLabel').textContent = label;
  }

  // ── Fetch availability + all 7 days' slots in parallel ───────────────────────
  async function loadWeek() {
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '<div class="state-msg">Loading availability…</div>';

    try {
      if (!avail) {
        const r = await fetch('/api/availability');
        avail = await r.json();
      }

      const days = Array.from({ length: 7 }, (_, i) => {
        const d = new Date(weekStart); d.setDate(d.getDate() + i); return d;
      });

      // Fetch slots for all 7 days in parallel
      const slotResults = await Promise.all(
        days.map(d => fetch(`/api/slots?date=${toDateStr(d)}`).then(r => r.json()).catch(() => []))
      );

      // Build lookup: dateStr → Map<time, available>
      const slotMap = {};
      days.forEach((d, i) => {
        const ds = toDateStr(d);
        slotMap[ds] = {};
        (slotResults[i] || []).forEach(s => { slotMap[ds][s.time] = s.available; });
      });

      renderGrid(days, slotMap);
    } catch (e) {
      grid.innerHTML = '<div class="state-msg">Failed to load availability. Please try again.</div>';
    }
  }

  // ── Build time slots list from availability config ───────────────────────────
  function buildTimes() {
    if (!avail) return [];
    const [sh, sm] = avail.startTime.split(':').map(Number);
    const [eh, em] = avail.endTime.split(':').map(Number);
    const times = [];
    for (let m = sh*60+sm; m < eh*60+em; m += avail.slotDuration) {
      times.push(`${String(Math.floor(m/60)).padStart(2,'0')}:${String(m%60).padStart(2,'0')}`);
    }
    return times;
  }

  // ── Render the grid ──────────────────────────────────────────────────────────
  function renderGrid(days, slotMap) {
    const today = new Date(); today.setHours(0,0,0,0);
    const now = new Date();
    const times = buildTimes();
    const grid = document.getElementById('calGrid');
    grid.innerHTML = '';

    if (times.length === 0) {
      grid.innerHTML = '<div class="state-msg">No availability configured yet.</div>';
      return;
    }

    // Header row
    const header = document.createElement('div');
    header.className = 'cal-header-row';
    const spacer = document.createElement('div');
    spacer.className = 'ch-spacer';
    header.appendChild(spacer);
    days.forEach((date, i) => {
      const isToday = date.getTime() === today.getTime();
      const col = document.createElement('div');
      col.className = 'ch-day';
      const nameEl = document.createElement('div');
      nameEl.className = 'ch-day-name';
      nameEl.textContent = DAYS[i];
      const numEl = document.createElement('div');
      numEl.className = 'ch-day-num' + (isToday ? ' today' : '');
      numEl.textContent = date.getDate();
      col.appendChild(nameEl);
      col.appendChild(numEl);
      header.appendChild(col);
    });
    grid.appendChild(header);

    // Time rows
    const dow = d => { const j = d.getDay(); return j === 0 ? 7 : j; }; // 1=Mon…7=Sun

    times.forEach(time => {
      const [h, m] = time.split(':').map(Number);
      const row = document.createElement('div');
      row.className = 'time-row';

      const label = document.createElement('div');
      label.className = 'time-cell';
      label.textContent = fmtTime(time);
      row.appendChild(label);

      days.forEach(date => {
        const ds = toDateStr(date);
        const cell = document.createElement('div');
        const dayNum = dow(date);
        const isWorkday = avail.weekdays.includes(dayNum);
        const isPast = date < today || (date.getTime() === today.getTime() && h * 60 + m <= now.getHours() * 60 + now.getMinutes());

        if (!isWorkday || isPast) {
          cell.className = 'slot-cell off';
        } else {
          cell.className = 'slot-cell';
          const inSlotMap = slotMap[ds] && time in slotMap[ds];
          const isAvailable = inSlotMap ? slotMap[ds][time] : true;

          const btn = document.createElement('button');
          btn.className = 'slot-btn ' + (isAvailable ? 'available' : 'booked');
          btn.textContent = isAvailable ? fmtTime(time) : 'Booked';
          btn.disabled = !isAvailable;
          if (isAvailable) {
            btn.addEventListener('click', () => openModal(ds, time, date));
          }
          cell.appendChild(btn);
        }
        row.appendChild(cell);
      });

      grid.appendChild(row);
    });
  }

  // ── Navigation ───────────────────────────────────────────────────────────────
  document.getElementById('prevWeek').addEventListener('click', () => {
    weekStart.setDate(weekStart.getDate() - 7);
    updateWeekLabel();
    loadWeek();
  });
  document.getElementById('nextWeek').addEventListener('click', () => {
    weekStart.setDate(weekStart.getDate() + 7);
    updateWeekLabel();
    loadWeek();
  });

  // ── Modal ────────────────────────────────────────────────────────────────────
  const backdrop   = document.getElementById('backdrop');
  const nameInput  = document.getElementById('nameInput');
  const emailInput = document.getElementById('emailInput');
  const nameErr    = document.getElementById('nameErr');
  const emailErr   = document.getElementById('emailErr');
  const modalErr   = document.getElementById('modalErr');
  const confirmBtn = document.getElementById('confirmBtn');

  function openModal(dateStr, time, dateObj) {
    selectedSlot = { date: dateStr, time };
    document.getElementById('modalSlotLabel').textContent = fmtTime(time);
    document.getElementById('modalSlotSub').textContent = formatDate(dateObj);
    nameInput.value = '';
    emailInput.value = '';
    nameErr.style.display = 'none';
    emailErr.style.display = 'none';
    modalErr.style.display = 'none';
    confirmBtn.disabled = false;
    backdrop.classList.remove('hidden');
    setTimeout(() => nameInput.focus(), 50);
  }

  function closeModal() {
    backdrop.classList.add('hidden');
    selectedSlot = null;
  }

  document.getElementById('cancelBtn').addEventListener('click', closeModal);
  backdrop.addEventListener('click', e => { if (e.target === backdrop) closeModal(); });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  confirmBtn.addEventListener('click', async () => {
    const name  = nameInput.value.trim();
    const email = emailInput.value.trim();
    let valid = true;
    nameErr.style.display  = name  ? 'none' : 'block'; if (!name)  valid = false;
    emailErr.style.display = (email && email.includes('@')) ? 'none' : 'block';
    if (!email || !email.includes('@')) valid = false;
    if (!valid) return;

    confirmBtn.disabled = true;
    confirmBtn.textContent = 'Booking…';
    modalErr.style.display = 'none';

    try {
      const res = await fetch('/api/book', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ name, email, date: selectedSlot.date, time: selectedSlot.time }),
      });
      const data = await res.json();
      if (!res.ok) {
        modalErr.textContent = data.error || 'Something went wrong. Please try again.';
        modalErr.style.display = 'block';
        confirmBtn.disabled = false;
        confirmBtn.textContent = 'Confirm booking';
        return;
      }
      closeModal();
      showConfirmation({ name, email, date: selectedSlot.date, time: selectedSlot.time });
      loadWeek(); // refresh grid to mark slot as booked
    } catch {
      modalErr.textContent = 'Network error. Please try again.';
      modalErr.style.display = 'block';
      confirmBtn.disabled = false;
      confirmBtn.textContent = 'Confirm booking';
    }
  });

  // ── Confirmation screen ───────────────────────────────────────────────────────
  function showConfirmation(b) {
    document.getElementById('calGrid').style.display = 'none';
    document.getElementById('confirmScreen').classList.remove('hidden');
    const dateObj = new Date(b.date + 'T00:00:00');
    document.getElementById('bookingSummary').innerHTML = `
      <div class="summary-row">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="currentColor" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
        ${name}
      </div>
      <div class="summary-row">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="currentColor" d="M20 4H4c-1.1 0-2 .9-2 2v12c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V6c0-1.1-.9-2-2-2zm0 4l-8 5-8-5V6l8 5 8-5v2z"/></svg>
        ${b.email}
      </div>
      <div class="summary-row">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="currentColor" d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .89-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.11-.89-2-2-2zm0 16H5V8h14v11z"/></svg>
        ${formatDate(dateObj)}
      </div>
      <div class="summary-row">
        <svg width="16" height="16" viewBox="0 0 24 24"><path fill="currentColor" d="M11.99 2C6.47 2 2 6.48 2 12s4.47 10 9.99 10C17.52 22 22 17.52 22 12S17.52 2 11.99 2zM12 20c-4.42 0-8-3.58-8-8s3.58-8 8-8 8 3.58 8 8-3.58 8-8 8zm.5-13H11v6l5.25 3.15.75-1.23-4.5-2.67V7z"/></svg>
        ${fmtTime(b.time)}
      </div>
    `;
  }

  // ── Boot ──────────────────────────────────────────────────────────────────────
  updateWeekLabel();
  loadWeek();
})();
</script>
</body>
</html>
