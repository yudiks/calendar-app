<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Calendar</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

<div class="shell">

  <!-- ── Top bar ── -->
  <header class="topbar">
    <div class="topbar-left">
      <button class="icon-btn" id="menuBtn" title="Main menu">
        <svg width="18" height="18" viewBox="0 0 18 18"><rect y="2" width="18" height="1.5" rx=".75" fill="currentColor"/><rect y="8.25" width="18" height="1.5" rx=".75" fill="currentColor"/><rect y="14.5" width="18" height="1.5" rx=".75" fill="currentColor"/></svg>
      </button>
      <div class="logo">
        <div class="logo-date" id="logoDate"></div>
        <span class="logo-word">Calendar</span>
      </div>
    </div>
    <div class="topbar-center">
      <button class="today-btn" id="todayBtn">Today</button>
      <button class="icon-btn" id="prev" title="Previous month">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
      </button>
      <button class="icon-btn" id="next" title="Next month">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
      </button>
      <h1 class="month-title" id="monthTitle"></h1>
    </div>
    <div class="topbar-right">
      <button class="icon-btn" title="Search">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M15.5 14h-.79l-.28-.27A6.47 6.47 0 0 0 16 9.5 6.5 6.5 0 1 0 9.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zm-6 0C7.01 14 5 11.99 5 9.5S7.01 5 9.5 5 14 7.01 14 9.5 11.99 14 9.5 14z"/></svg>
      </button>
      <button class="icon-btn" title="Settings">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94s-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
      </button>
    </div>
  </header>

  <div class="body-layout">

    <!-- ── Sidebar ── -->
    <aside class="sidebar" id="sidebar">
      <button class="create-btn" id="createBtn">
        <svg width="20" height="20" viewBox="0 0 24 24"><path fill="currentColor" d="M19 13h-6v6h-2v-6H5v-2h6V5h2v6h6v2z"/></svg>
        Create
      </button>

      <!-- Mini calendar -->
      <div class="mini-cal">
        <div class="mini-cal-header">
          <span class="mini-month-title" id="miniMonthTitle"></span>
          <div>
            <button class="icon-btn sm" id="miniPrev">
              <svg width="16" height="16" viewBox="0 0 24 24"><path fill="currentColor" d="M15.41 7.41L14 6l-6 6 6 6 1.41-1.41L10.83 12z"/></svg>
            </button>
            <button class="icon-btn sm" id="miniNext">
              <svg width="16" height="16" viewBox="0 0 24 24"><path fill="currentColor" d="M10 6L8.59 7.41 13.17 12l-4.58 4.59L10 18l6-6z"/></svg>
            </button>
          </div>
        </div>
        <div class="mini-grid-labels">
          <span>M</span><span>T</span><span>W</span><span>T</span><span>F</span><span>S</span><span>S</span>
        </div>
        <div class="mini-days" id="miniDays"></div>
      </div>

      <!-- My Calendars -->
      <div class="cal-list">
        <div class="cal-list-title">My calendars</div>
        <div class="cal-item"><span class="dot" style="background:#4285f4"></span> Personal</div>
        <div class="cal-item"><span class="dot" style="background:#0b8043"></span> Work</div>
        <div class="cal-item"><span class="dot" style="background:#e67c73"></span> Birthdays</div>
      </div>

      <!-- Share booking link -->
      <div class="share-section">
        <div class="share-title">Your booking page</div>
        <p class="share-desc">Share this link so people can book time with you</p>
        <div class="share-url-row">
          <span class="share-url" id="shareUrl"></span>
          <button class="copy-btn" id="copyBtn" title="Copy link">
            <svg width="16" height="16" viewBox="0 0 24 24"><path fill="currentColor" d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
          </button>
        </div>
        <a class="open-book-btn" id="openBookBtn" target="_blank">Open booking page ↗</a>
      </div>
    </aside>

    <!-- ── Main calendar ── -->
    <main class="main">
      <div class="grid-header" id="gridHeader"></div>
      <div class="grid-body" id="gridBody"></div>
    </main>

  </div>
</div>

<!-- ── Event modal ── -->
<div class="modal-backdrop hidden" id="backdrop">
  <div class="modal" role="dialog" aria-modal="true">
    <div class="modal-topbar">
      <button class="icon-btn" id="cancelBtn" title="Close">
        <svg width="18" height="18" viewBox="0 0 24 24"><path fill="currentColor" d="M19 6.41L17.59 5 12 10.59 6.41 5 5 6.41 10.59 12 5 17.59 6.41 19 12 13.41 17.59 19 19 17.59 13.41 12z"/></svg>
      </button>
    </div>
    <form id="eventForm" novalidate>
      <input class="modal-title-input" type="text" id="evtTitle" placeholder="Add title" maxlength="80" />
      <span class="err hidden" id="titleErr">Please add a title.</span>

      <div class="modal-row">
        <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24"><path fill="#5f6368" d="M19 3h-1V1h-2v2H8V1H6v2H5c-1.11 0-2 .89-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.11-.89-2-2-2zm0 16H5V8h14v11z"/></svg>
        <input type="date" id="evtDate" />
        <input type="time" id="evtTime" />
      </div>
      <span class="err hidden" id="dateErr">Please pick a date.</span>

      <div class="modal-row">
        <svg class="field-icon" width="18" height="18" viewBox="0 0 24 24"><path fill="#5f6368" d="M12 2C6.48 2 2 6.48 2 12s4.48 10 10 10 10-4.48 10-10S17.52 2 12 2zm-2 14.5v-9l6 4.5-6 4.5z"/></svg>
        <select id="evtColor">
          <option value="#4285f4">Blue — Personal</option>
          <option value="#0b8043">Green — Work</option>
          <option value="#e67c73">Red — Birthday</option>
          <option value="#f6bf26">Yellow</option>
          <option value="#8e24aa">Purple</option>
        </select>
      </div>

      <div class="modal-actions">
        <button type="button" class="btn-ghost danger hidden" id="deleteBtn">Delete</button>
        <div style="flex:1"></div>
        <button type="button" class="btn-ghost" id="cancelBtn2">Cancel</button>
        <button type="submit" class="btn-save">Save</button>
      </div>
    </form>
  </div>
</div>

<script>
  (function() {
    const bookUrl = window.location.origin + '/book';
    const shareUrl = document.getElementById('shareUrl');
    const copyBtn = document.getElementById('copyBtn');
    const openBookBtn = document.getElementById('openBookBtn');
    if (shareUrl) shareUrl.textContent = bookUrl;
    if (openBookBtn) openBookBtn.href = bookUrl;
    if (copyBtn) copyBtn.addEventListener('click', () => {
      navigator.clipboard.writeText(bookUrl).then(() => {
        copyBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24"><path fill="#0b8043" d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>';
        setTimeout(() => {
          copyBtn.innerHTML = '<svg width="16" height="16" viewBox="0 0 24 24"><path fill="currentColor" d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>';
        }, 2000);
      });
    });
  })();
</script>
<script src="app.js"></script>
</body>
</html>
