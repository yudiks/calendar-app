<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — Booking Settings</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: "Google Sans", Roboto, Arial, sans-serif;
      background: #f8f9fa;
      color: #3c4043;
      min-height: 100vh;
    }

    /* ── Top bar ── */
    .topbar {
      display: flex;
      align-items: center;
      height: 64px;
      padding: 0 24px;
      background: #fff;
      border-bottom: 1px solid #dadce0;
      gap: 16px;
      position: sticky;
      top: 0;
      z-index: 10;
    }

    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-badge {
      width: 36px;
      height: 36px;
      background: #4285f4;
      color: #fff;
      border-radius: 6px;
      font-size: 1rem;
      font-weight: 700;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .topbar-title {
      font-size: 1.25rem;
      font-weight: 400;
      color: #3c4043;
      letter-spacing: -.25px;
    }

    .back-link {
      margin-left: auto;
      font-size: .875rem;
      color: #4285f4;
      text-decoration: none;
      display: flex;
      align-items: center;
      gap: 4px;
      padding: 6px 12px;
      border-radius: 4px;
      transition: background .15s;
    }
    .back-link:hover { background: #e8f0fe; }

    /* ── Page layout ── */
    .page {
      max-width: 760px;
      margin: 32px auto;
      padding: 0 16px 48px;
      display: flex;
      flex-direction: column;
      gap: 24px;
    }

    /* ── Cards ── */
    .card {
      background: #fff;
      border: 1px solid #dadce0;
      border-radius: 8px;
      overflow: hidden;
    }

    .card-header {
      padding: 20px 24px 16px;
      border-bottom: 1px solid #dadce0;
    }

    .card-title {
      font-size: 1rem;
      font-weight: 500;
      color: #3c4043;
    }

    .card-subtitle {
      font-size: .8125rem;
      color: #5f6368;
      margin-top: 2px;
    }

    .card-body {
      padding: 20px 24px;
    }

    /* ── Form ── */
    .form-row {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 20px;
    }
    .form-row:last-of-type { margin-bottom: 0; }

    label.field-label {
      font-size: .8125rem;
      font-weight: 500;
      color: #3c4043;
    }

    .day-checkboxes {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 4px;
    }

    .day-chip {
      display: flex;
      align-items: center;
      gap: 0;
    }

    .day-chip input[type="checkbox"] {
      display: none;
    }

    .day-chip-label {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 40px;
      height: 40px;
      border-radius: 50%;
      font-size: .8125rem;
      font-weight: 500;
      color: #5f6368;
      border: 1px solid #dadce0;
      cursor: pointer;
      transition: background .15s, color .15s, border-color .15s;
      user-select: none;
    }

    .day-chip input[type="checkbox"]:checked + .day-chip-label {
      background: #4285f4;
      color: #fff;
      border-color: #4285f4;
    }

    .day-chip-label:hover {
      background: #f1f3f4;
    }

    .day-chip input[type="checkbox"]:checked + .day-chip-label:hover {
      background: #1a73e8;
    }

    .time-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .time-group {
      display: flex;
      flex-direction: column;
      gap: 4px;
      flex: 1;
      min-width: 120px;
    }

    input[type="time"],
    select.field-select {
      border: 1px solid #dadce0;
      border-radius: 4px;
      padding: 8px 10px;
      font-size: .875rem;
      color: #3c4043;
      font-family: inherit;
      background: #fff;
      outline: none;
      transition: border-color .15s;
      width: 100%;
    }

    input[type="time"]:focus,
    select.field-select:focus {
      border-color: #4285f4;
      box-shadow: 0 0 0 2px rgba(66,133,244,.15);
    }

    .form-actions {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #dadce0;
    }

    .btn-primary {
      background: #4285f4;
      color: #fff;
      border: none;
      border-radius: 4px;
      padding: 9px 24px;
      font-size: .875rem;
      font-weight: 500;
      font-family: inherit;
      cursor: pointer;
      transition: background .15s;
    }
    .btn-primary:hover { background: #1a73e8; }
    .btn-primary:disabled { background: #dadce0; color: #80868b; cursor: not-allowed; }

    .status-msg {
      font-size: .8125rem;
      padding: 4px 0;
    }
    .status-msg.success { color: #0b8043; }
    .status-msg.error   { color: #d93025; }
    .status-msg.hidden  { display: none; }

    /* ── Bookings section ── */
    .bookings-toolbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
    }

    .btn-ghost {
      background: none;
      border: 1px solid #dadce0;
      border-radius: 4px;
      padding: 7px 16px;
      font-size: .8125rem;
      font-weight: 500;
      font-family: inherit;
      color: #3c4043;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 6px;
      transition: background .15s;
    }
    .btn-ghost:hover { background: #f1f3f4; }

    .bookings-table-wrap {
      overflow-x: auto;
      margin-top: 16px;
    }

    table.bookings-table {
      width: 100%;
      border-collapse: collapse;
      font-size: .875rem;
    }

    .bookings-table th {
      text-align: left;
      font-size: .75rem;
      font-weight: 500;
      color: #5f6368;
      text-transform: uppercase;
      letter-spacing: .04em;
      padding: 8px 12px;
      border-bottom: 1px solid #dadce0;
      white-space: nowrap;
    }

    .bookings-table td {
      padding: 12px 12px;
      border-bottom: 1px solid #f1f3f4;
      color: #3c4043;
      vertical-align: middle;
    }

    .bookings-table tr:last-child td { border-bottom: none; }
    .bookings-table tr:hover td { background: #f8f9fa; }

    .empty-state {
      text-align: center;
      color: #80868b;
      font-size: .875rem;
      padding: 40px 24px;
    }

    .skeleton-row td {
      padding: 14px 12px;
    }

    .skel {
      height: 14px;
      border-radius: 4px;
      background: linear-gradient(90deg, #f1f3f4 25%, #e8eaed 50%, #f1f3f4 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
    }

    @keyframes shimmer {
      0%   { background-position: 200% 0; }
      100% { background-position: -200% 0; }
    }

    /* ── Responsive ── */
    @media (max-width: 600px) {
      .topbar { padding: 0 16px; }
      .page { margin: 16px auto; }
      .card-header, .card-body { padding: 16px; }
      .form-actions { flex-wrap: wrap; }
    }
  </style>
</head>
<body>

<!-- ── Top bar ── -->
<header class="topbar">
  <div class="topbar-logo">
    <div class="logo-badge">A</div>
    <span class="topbar-title">Admin — Booking Settings</span>
  </div>
  <a class="back-link" href="/">
    <svg width="16" height="16" viewBox="0 0 24 24"><path fill="currentColor" d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/></svg>
    Back to calendar
  </a>
</header>

<!-- ── Page ── -->
<div class="page">

  <!-- ── Section 1: Availability ── -->
  <section class="card" id="availCard">
    <div class="card-header">
      <div class="card-title">Availability Settings</div>
      <div class="card-subtitle">Configure the days and hours when people can book time with you.</div>
    </div>
    <div class="card-body">
      <form id="availForm" novalidate>

        <div class="form-row">
          <label class="field-label">Available days</label>
          <div class="day-checkboxes" id="dayCheckboxes">
            <!-- rendered by JS -->
          </div>
        </div>

        <div class="form-row">
          <label class="field-label">Hours</label>
          <div class="time-row">
            <div class="time-group">
              <label class="field-label" for="startTime" style="font-weight:400;color:#5f6368;">Start</label>
              <input type="time" id="startTime" value="09:00" />
            </div>
            <div class="time-group">
              <label class="field-label" for="endTime" style="font-weight:400;color:#5f6368;">End</label>
              <input type="time" id="endTime" value="17:00" />
            </div>
          </div>
        </div>

        <div class="form-row">
          <label class="field-label" for="slotDuration">Slot duration</label>
          <select id="slotDuration" class="field-select" style="max-width:200px;">
            <option value="15">15 minutes</option>
            <option value="30" selected>30 minutes</option>
            <option value="60">60 minutes</option>
          </select>
        </div>

        <div class="form-actions">
          <button type="submit" class="btn-primary" id="saveBtn">Save settings</button>
          <span class="status-msg hidden" id="saveStatus"></span>
        </div>

      </form>
    </div>
  </section>

  <!-- ── Section 2: Bookings ── -->
  <section class="card">
    <div class="card-header">
      <div class="bookings-toolbar">
        <div>
          <div class="card-title">Upcoming Bookings</div>
          <div class="card-subtitle">Future bookings, sorted by date.</div>
        </div>
        <button class="btn-ghost" id="refreshBtn">
          <svg width="16" height="16" viewBox="0 0 24 24"><path fill="currentColor" d="M17.65 6.35A7.958 7.958 0 0 0 12 4c-4.42 0-7.99 3.58-7.99 8s3.57 8 7.99 8c3.73 0 6.84-2.55 7.73-6h-2.08A5.99 5.99 0 0 1 12 18c-3.31 0-6-2.69-6-6s2.69-6 6-6c1.66 0 3.14.69 4.22 1.78L13 11h7V4l-2.35 2.35z"/></svg>
          Refresh
        </button>
      </div>
    </div>
    <div class="card-body" style="padding-top:0;padding-bottom:0;">
      <div class="bookings-table-wrap">
        <table class="bookings-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Time</th>
              <th>Name</th>
              <th>Email</th>
            </tr>
          </thead>
          <tbody id="bookingsBody">
            <!-- skeleton rows while loading -->
            <tr class="skeleton-row"><td><div class="skel" style="width:80px"></div></td><td><div class="skel" style="width:55px"></div></td><td><div class="skel" style="width:120px"></div></td><td><div class="skel" style="width:160px"></div></td></tr>
            <tr class="skeleton-row"><td><div class="skel" style="width:80px"></div></td><td><div class="skel" style="width:55px"></div></td><td><div class="skel" style="width:100px"></div></td><td><div class="skel" style="width:180px"></div></td></tr>
          </tbody>
        </table>
      </div>
      <div class="empty-state hidden" id="bookingsEmpty">No bookings yet.</div>
    </div>
  </section>

</div>

<script>
  'use strict';

  /* ── Day chips ── */
  const DAYS = [
    { label: 'M', value: 1, name: 'Mon' },
    { label: 'T', value: 2, name: 'Tue' },
    { label: 'W', value: 3, name: 'Wed' },
    { label: 'T', value: 4, name: 'Thu' },
    { label: 'F', value: 5, name: 'Fri' },
    { label: 'S', value: 6, name: 'Sat' },
    { label: 'S', value: 7, name: 'Sun' },
  ];

  const DEFAULT_WEEKDAYS = [1, 2, 3, 4, 5];

  const dayContainer = document.getElementById('dayCheckboxes');
  DAYS.forEach(d => {
    const wrap = document.createElement('label');
    wrap.className = 'day-chip';
    wrap.title = d.name;
    const cb = document.createElement('input');
    cb.type = 'checkbox';
    cb.name = 'weekday';
    cb.value = d.value;
    cb.checked = DEFAULT_WEEKDAYS.includes(d.value);
    const lbl = document.createElement('span');
    lbl.className = 'day-chip-label';
    lbl.textContent = d.label;
    wrap.appendChild(cb);
    wrap.appendChild(lbl);
    dayContainer.appendChild(wrap);
  });

  function getCheckedDays() {
    return [...document.querySelectorAll('input[name="weekday"]:checked')]
      .map(cb => Number(cb.value));
  }

  function setCheckedDays(weekdays) {
    document.querySelectorAll('input[name="weekday"]').forEach(cb => {
      cb.checked = weekdays.includes(Number(cb.value));
    });
  }

  /* ── Load availability on page load ── */
  async function loadAvailability() {
    try {
      const res = await fetch('/api/availability');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      if (Array.isArray(data.weekdays))     setCheckedDays(data.weekdays);
      if (data.startTime)                   document.getElementById('startTime').value = data.startTime;
      if (data.endTime)                     document.getElementById('endTime').value   = data.endTime;
      if (data.slotDuration) {
        const sel = document.getElementById('slotDuration');
        const opt = [...sel.options].find(o => Number(o.value) === data.slotDuration);
        if (opt) sel.value = opt.value;
      }
    } catch (err) {
      // API not yet implemented — leave defaults in place, silently continue
      console.info('GET /api/availability not available:', err.message);
    }
  }

  /* ── Save availability ── */
  const availForm  = document.getElementById('availForm');
  const saveBtn    = document.getElementById('saveBtn');
  const saveStatus = document.getElementById('saveStatus');

  function showStatus(msg, type) {
    saveStatus.textContent = msg;
    saveStatus.className = `status-msg ${type}`;
  }

  availForm.addEventListener('submit', async e => {
    e.preventDefault();
    saveBtn.disabled = true;
    showStatus('Saving…', '');

    const payload = {
      weekdays:     getCheckedDays(),
      startTime:    document.getElementById('startTime').value,
      endTime:      document.getElementById('endTime').value,
      slotDuration: Number(document.getElementById('slotDuration').value),
    };

    try {
      const res = await fetch('/api/availability', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify(payload),
      });
      if (!res.ok) throw new Error(`Server responded with ${res.status}`);
      showStatus('Settings saved.', 'success');
    } catch (err) {
      showStatus(`Error: ${err.message}`, 'error');
    } finally {
      saveBtn.disabled = false;
    }
  });

  /* ── Bookings ── */
  const bookingsBody  = document.getElementById('bookingsBody');
  const bookingsEmpty = document.getElementById('bookingsEmpty');

  function formatDate(dateStr) {
    // dateStr expected as ISO date or datetime string
    const d = new Date(dateStr);
    if (isNaN(d)) return dateStr;
    return d.toLocaleDateString('en-US', { weekday: 'short', month: 'short', day: 'numeric', year: 'numeric' });
  }

  function formatTime(dateStr) {
    const d = new Date(dateStr);
    if (isNaN(d)) return '';
    return d.toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
  }

  function renderBookings(bookings) {
    bookingsBody.innerHTML = '';
    bookingsEmpty.classList.add('hidden');

    const now = new Date();

    // Filter to future only, sort ascending
    const future = bookings
      .filter(b => {
        const d = new Date(b.date || b.datetime || b.start);
        return !isNaN(d) && d >= now;
      })
      .sort((a, b) => {
        const da = new Date(a.date || a.datetime || a.start);
        const db = new Date(b.date || b.datetime || b.start);
        return da - db;
      });

    if (future.length === 0) {
      bookingsEmpty.classList.remove('hidden');
      return;
    }

    future.forEach(b => {
      const raw = b.date || b.datetime || b.start || '';
      const tr  = document.createElement('tr');
      tr.innerHTML = `
        <td>${formatDate(raw)}</td>
        <td>${b.time || formatTime(raw)}</td>
        <td>${escHtml(b.name || '—')}</td>
        <td><a href="mailto:${escHtml(b.email || '')}" style="color:#4285f4;text-decoration:none;">${escHtml(b.email || '—')}</a></td>
      `;
      bookingsBody.appendChild(tr);
    });
  }

  function escHtml(str) {
    return String(str)
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;');
  }

  async function loadBookings() {
    bookingsBody.innerHTML = `
      <tr class="skeleton-row"><td><div class="skel" style="width:80px"></div></td><td><div class="skel" style="width:55px"></div></td><td><div class="skel" style="width:120px"></div></td><td><div class="skel" style="width:160px"></div></td></tr>
      <tr class="skeleton-row"><td><div class="skel" style="width:80px"></div></td><td><div class="skel" style="width:55px"></div></td><td><div class="skel" style="width:100px"></div></td><td><div class="skel" style="width:180px"></div></td></tr>
    `;
    bookingsEmpty.classList.add('hidden');

    try {
      const res = await fetch('/api/bookings');
      if (!res.ok) throw new Error(`HTTP ${res.status}`);
      const data = await res.json();
      const list = Array.isArray(data) ? data : (data.bookings || []);
      renderBookings(list);
    } catch (err) {
      console.info('GET /api/bookings not available:', err.message);
      bookingsBody.innerHTML = '';
      bookingsEmpty.textContent = 'Could not load bookings — API not available yet.';
      bookingsEmpty.classList.remove('hidden');
    }
  }

  document.getElementById('refreshBtn').addEventListener('click', loadBookings);

  /* ── Init ── */
  loadAvailability();
  loadBookings();
</script>

</body>
</html>
